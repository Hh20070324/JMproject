<h2>你想要什么样的视觉风格？</h2>
<p class="subtitle">选择你喜欢的整体设计方向</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>🌙 暗色漫画风</h3>
      <p>深色背景，高对比度，像漫画阅读器一样沉浸式。配色偏暗紫/暗橙暖调，符合"深夜看漫画"的氛围。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>🍥 日系清新风</h3>
      <p>浅色背景，柔和的粉色/樱花色系，圆角卡片，干净清爽——像日本漫画书店的精致感。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>💻 极简工具风</h3>
      <p>现代扁平设计，黑白灰主调 + 单一强调色（蓝/绿），重效率不重花哨，像专业下载工具。</p>
    </div>
  </div>
</div>
