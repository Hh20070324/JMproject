<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>JM 漫画下载器</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header class="app-header">
    <div class="brand-mark" aria-hidden="true">JM</div>
    <div class="brand-copy">
      <h1>漫画下载器</h1>
      <p>本地下载与归档</p>
    </div>
    <div class="connection" id="connection" data-state="connecting">
      <span class="connection-dot" aria-hidden="true"></span>
      <span id="connection-text">正在建立实时更新</span>
    </div>
  </header>

  <main class="workspace">
    <section class="command-bar" aria-label="新建下载">
      <label class="album-input-wrap" for="input-album">
        <span class="input-prefix">#</span>
        <input
          type="text"
          id="input-album"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="off"
          placeholder="输入漫画车号"
          autofocus
        >
      </label>
      <button class="button button-primary" id="btn-add" type="button">开始下载</button>
    </section>

    <div class="view-header">
      <nav class="view-tabs" aria-label="内容视图">
        <button class="view-tab active" data-view="downloads" type="button">
          下载任务
          <span class="tab-count" id="task-count">0</span>
        </button>
        <button class="view-tab" data-view="library" type="button">
          漫画库
          <span class="tab-count" id="library-count">0</span>
        </button>
      </nav>
      <button class="button button-quiet refresh-button" id="btn-refresh" type="button" hidden>刷新</button>
    </div>

    <section class="view-panel" id="view-downloads" aria-label="下载任务">
      <div class="summary" id="summary" hidden>
        <div><strong id="stat-active">0</strong><span>进行中</span></div>
        <div><strong id="stat-pending">0</strong><span>等待</span></div>
        <div><strong id="stat-completed">0</strong><span>完成</span></div>
        <div><strong id="stat-failed">0</strong><span>失败</span></div>
      </div>
      <div class="task-list" id="queue"></div>
    </section>

    <section class="view-panel" id="view-library" aria-label="漫画库" hidden>
      <div class="library-toolbar">
        <label class="search-wrap" for="library-search">
          <span aria-hidden="true">⌕</span>
          <input id="library-search" type="search" placeholder="搜索车号" autocomplete="off">
        </label>
        <div class="segmented" role="group" aria-label="漫画库筛选">
          <button class="segment active" data-filter="all" type="button">全部</button>
          <button class="segment" data-filter="images" type="button">有图片</button>
          <button class="segment" data-filter="pdf" type="button">有 PDF</button>
        </div>
      </div>
      <div class="library-grid" id="library"></div>
    </section>
  </main>

  <div class="toast-region" id="toast-region" aria-live="polite"></div>
  <script src="/app.js" defer></script>
</body>
</html>
