# ============ 下载目录配置 ============
dir_rule:
  # 下载到项目根目录下，按 [本子编号_本子名] 命名子目录
  base_dir: .
  rule: Bd_Aid_Pname

# ============ 下载配置 ============
download:
  # 多线程加速（同时下载 16 张图片）
  threading:
    image: 16
  # 图片格式
  image:
    suffix: .jpg

# ============ 网络请求配置 ============
client:
  # 单个请求失败后额外重试 3 次
  retry_times: 3
  postman:
    meta_data:
      # 每次网络请求最多等待 60 秒
      timeout: 60
